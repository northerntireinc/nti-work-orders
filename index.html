async function fetchAllWOs() {
  const {data,error} = await sb.from("work_orders").select("*").order("id",{ascending:false});
  if(error) throw error;
  return data || [];
}
async function upsertWO(wo) {
  const row = {
    id: wo.id, date: wo.date, customer: wo.customer,
    technician: wo.technician||"Jeremy Forbes",
    lines: wo.lines, status: wo.status,
    invoice_no: wo.invoiceNo||"", notes: wo.notes||"",
    created_at: wo.createdAt||Date.now(), email_sent: wo.emailSent||false,
  };
  const {error} = await sb.from("work_orders").upsert(row);
  if(error) throw error;
}
async function deleteWOdb(id) {
  const {error} = await sb.from("work_orders").delete().eq("id",id);
  if(error) throw error;
}
async function getNextId() {
  const {data} = await sb.from("work_orders").select("id").order("id",{ascending:false}).limit(1);
  if(data&&data.length>0){
    const last = parseInt(data[0].id,10);
    return isNaN(last)?STARTING_WO:last+1;
  }
  return STARTING_WO;
}

// ─── QBO CSV ──────────────────────────────────────────────────────────────────
function buildCSV(wos){
  const hdr=["*InvoiceNo","*Customer","*InvoiceDate","*DueDate","Terms",
    "*Item(Product/Service)","ItemDescription","*ItemQuantity","*ItemRate","ItemAmount","*Tax"];
  const rows=[hdr];
  wos.forEach(wo=>{
    const inv=wo.invoiceNo||`NTI-${wo.id}`;
    const due=new Date(wo.date); due.setDate(due.getDate()+30);
    const dueStr=due.toISOString().split("T")[0];
    (wo.lines||[]).forEach((l,i)=>{
      const desc=[
        l.unitNo&&`Unit:${l.unitNo}`,l.position&&`Pos:${l.position}`,
        l.tireSize,l.make,l.serialNo&&`S/N:${l.serialNo}`,
        l.brNo&&`Br#${l.brNo}`,l.rimNo&&`Rim#${l.rimNo}`,l.notes,
      ].filter(Boolean).join(" | ");
      rows.push([i===0?inv:"",i===0?wo.customer:"",i===0?wo.date:"",
        i===0?dueStr:"",i===0?"Net 30":"",
        l.serviceType,desc,l.qty,Number(l.rate).toFixed(2),lTotal(l).toFixed(2),"N"]);
    });
  });
  return rows.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n");
}
function downloadCSV(wos){
  const a=Object.assign(document.createElement("a"),{
    href:URL.createObjectURL(new Blob([buildCSV(wos)],{type:"text/csv"})),
    download:`NTI_QBO_${tod()}.csv`
  });
  a.click();
}

  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
      mcp_servers:[{type:"url",url:"https://gmail.mcp.claude.com/mcp",name:"gmail"}],
      messages:[{role:"user",content:prompt}]}),
  });
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${resp.status}`);}
  return resp.json();
}

function AcInput({value,onChange,options,placeholder,monoFont}){
  const [open,setOpen]=useState(false);
  const [cursor,setCursor]=useState(-1);
  const ref=useRef(null); const listRef=useRef(null); const timer=useRef(null);
  const filtered=value.trim()===""?options.slice(0,14):options.filter(o=>o.toLowerCase().includes(value.toLowerCase())).slice(0,14);
  const pick=v=>{onChange(v);setOpen(false);setCursor(-1);};
  const handleKey=e=>{
    if(!open){if(e.key==="ArrowDown"||e.key==="Enter")setOpen(true);return;}
    if(e.key==="ArrowDown"){e.preventDefault();setCursor(c=>Math.min(c+1,filtered.length-1));}
    if(e.key==="ArrowUp"){e.preventDefault();setCursor(c=>Math.max(c-1,-1));}
    if(e.key==="Enter"){e.preventDefault();if(cursor>=0&&filtered[cursor])pick(filtered[cursor]);else setOpen(false);}
    if(e.key==="Escape"){setOpen(false);setCursor(-1);}
    if(e.key==="Tab")setOpen(false);
  };
  useEffect(()=>{if(cursor>=0&&listRef.current)listRef.current.children[cursor]?.scrollIntoView({block:"nearest"});},[cursor]);
  const highlight=(opt)=>{
    const idx=opt.toLowerCase().indexOf(value.toLowerCase());
    if(!value||idx<0)return opt;
    return <>{opt.slice(0,idx)}<strong className="ac-match">{opt.slice(idx,idx+value.length)}</strong>{opt.slice(idx+value.length)}</>;
  };
  return (
    <div className="ac-wrap">
      <input ref={ref} className={`form-input${monoFont?" mono":""}`}
        value={value} placeholder={placeholder} autoComplete="off"
        onChange={e=>{onChange(e.target.value);setOpen(true);setCursor(-1);}}
        onFocus={()=>setOpen(true)}
        onBlur={()=>{timer.current=setTimeout(()=>setOpen(false),160);}}
        onKeyDown={handleKey}/>
      {open&&filtered.length>0&&(
        <ul ref={listRef} className="ac-list"
          onMouseDown={e=>{clearTimeout(timer.current);e.preventDefault();}}>
          {filtered.map((opt,i)=>(
            <li key={opt} className={`ac-item${i===cursor?" active":""}`} onClick={()=>pick(opt)}>
              {highlight(opt)}
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

      <nav className="nti-nav">
        <div className="nti-nav-inner">
          <div className="nti-logo">
            <span className="nti-logo-mark">NTI</span>
            <span className="nti-logo-sub">Work Orders</span>
          </div>
          <div className="nti-nav-links">
            {[["dash","Dashboard"],["new","＋ New WO"],["invoices","Invoices"],["settings","⚙ Settings"]].map(([v,l])=>(
              <button key={v} className={`nti-nav-btn${(view===v||(v==="new"&&view==="edit"))?" active":""}`}
                onClick={()=>v==="new"?openNew():setView(v)}>{l}</button>
            ))}
          </div>
        </div>
      </nav>

      {toast&&<div className={`nti-toast ${toast.type}`}>{toast.msg}</div>}

      <div className="nti-main">
        {view==="dash"     && <Dashboard wos={wos} sending={sending} onEdit={openEdit} onDelete={deleteWO} onExport={downloadCSV} onResend={triggerEmail} autoEmail={settings.autoEmail}/>}
        {view==="edit"     && editWO && <WOForm wo={editWO} onSave={saveWO} onCancel={()=>{setView("dash");setEditWO(null);}} autoEmail={settings.autoEmail}/>}
        {view==="invoices" && <InvoicesView wos={wos} onExport={downloadCSV} onMarkInvoiced={markInvoiced} onEdit={openEdit}/>}
        {view==="settings" && <SettingsView settings={settings} onSave={saveSettings}/>}
      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({wos,sending,onEdit,onDelete,onExport,onResend,autoEmail}){
  const open=wos.filter(w=>w.status==="open");
  const inv=wos.filter(w=>w.status==="invoiced");
  const sorted=[...wos].sort((a,b)=>Number(b.id)-Number(a.id));
  return (
    <div>
      <div className="stat-row">
        <StatCard label="Open WOs"     value={open.length}  accent="#e67e22"/>
        <StatCard label="Invoiced"     value={inv.length}   accent="#27ae60"/>
        <StatCard label="Open Balance" value={$f(open.reduce((s,w)=>s+wTotal(w),0))} accent="#2980b9"/>
        <StatCard label="Auto-Email"   value={autoEmail?"ON":"OFF"} accent={autoEmail?"#27ae60":"#95a5a6"}/>
      </div>
      <div className="nti-card">
        <div className="nti-card-header">
          <span>Work Orders</span>
          {open.length>0&&<button className="btn-outline" onClick={()=>onExport(open)}>Export Open → QBO</button>}
        </div>
        {sorted.length===0?<div className="empty-state">No work orders yet. Click <strong>＋ New WO</strong>.</div>:(
          <div style={{overflowX:"auto"}}>
            <table className="nti-table">
              <thead><tr>
                <th>WO #</th><th>Date</th><th>Customer</th><th>Technician</th>
                <th className="right">Amount</th><th className="center">Status</th>
                <th className="center">Email</th><th className="right">Actions</th>
              </tr></thead>
              <tbody>{sorted.map(wo=>{
                const st=sending[wo.id];
                return (
                  <tr key={wo.id}>
                    <td><span className="wo-num">#{wo.id}</span></td>
                    <td className="muted">{wo.date}</td>
                    <td className="fw6">{wo.customer}</td>
                    <td className="muted">{wo.technician||"Jeremy Forbes"}</td>
                    <td className="right fw6">{$f(wTotal(wo))}</td>
                    <td className="center">{wo.status==="open"?<span className="badge badge-orange">Open</span>:<span className="badge badge-green">#{wo.invoiceNo}</span>}</td>
                    <td className="center">
                      {st==="sending"&&<span className="estatus es-sending">⏳</span>}
                      {st==="sent"&&<span className="estatus es-sent">✓</span>}
                      {st==="error"&&<span className="estatus es-err">✗</span>}
                      {!st&&wo.emailSent&&<span className="estatus es-sent">✓</span>}
                      {!st&&!wo.emailSent&&<span className="estatus es-none">—</span>}
                    </td>
                    <td className="right" style={{whiteSpace:"nowrap"}}>
                      <button className="action-btn ab-blue"  onClick={()=>onEdit(wo)}>Edit</button>
                      <button className="action-btn ab-green" onClick={()=>onExport([wo])}>QBO</button>
                      <button className="action-btn ab-email" onClick={()=>onResend(wo)}>📧</button>
                      <button className="action-btn ab-red"   onClick={()=>onDelete(wo.id)}>✕</button>
                    </td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}
function StatCard({label,value,accent}){return(<div className="stat-card" style={{borderTopColor:accent}}><div className="stat-label">{label}</div><div className="stat-value" style={{color:accent}}>{value}</div></div>);}

// ─── WORK ORDER FORM ──────────────────────────────────────────────────────────
function WOForm({wo,onSave,onCancel,autoEmail}){
  const [form,setForm]=useState(wo);
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));

  const updateLine=(id,updates)=>setForm(f=>({
    ...f,
    lines:f.lines.map(l=>{
      if(l.id!==id)return l;
      const u={...l,...updates};
      if(updates.tireSize!==undefined){const cat=tireToCat(updates.tireSize);if(cat)u.pricingCat=cat;}
      if(updates.pricingCat!==undefined||updates.serviceType!==undefined){
        const cat=updates.pricingCat??u.pricingCat;
        const svc=updates.serviceType??u.serviceType;
        const br=bookRate(cat,svc);
        if(br>0)u.rate=br;
      }
      return u;
    })
  }));

  const addLine=()=>setForm(f=>({...f,lines:[...f.lines,newLine()]}));
  const removeLine=id=>setForm(f=>({...f,lines:f.lines.filter(l=>l.id!==id)}));
  const total=(form.lines||[]).reduce((s,l)=>s+lTotal(l),0);

  return (
    <div>
      <div className="nti-card">
        <div className="wo-form-header">
          <div><div className="wo-company">NORTHERN TIRE, INC.</div><div className="wo-subtitle">Work Order</div></div>
          <div className="wo-num-big">#{form.id}</div>
        </div>
        <div style={{padding:"20px 24px"}}>
          <div className="form-row-2 mb16">
            <div className="fg">
              <label className="form-label">Customer</label>
              <AcInput value={form.customer} onChange={v=>setF("customer",v)} options={QBO_CUSTOMERS} placeholder="Search customers…"/>
            </div>
            <div className="fg">
              <label className="form-label">Date</label>
              <input type="date" className="form-input" value={form.date} onChange={e=>setF("date",e.target.value)}/>
            </div>
          </div>

          <div className="section-heading">Service Lines</div>
          <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:12}}>
            {form.lines.map((line,idx)=>(
              <LineRow key={line.id} line={line} idx={idx}
                canRemove={form.lines.length>1}
                onChange={updateLine} onRemove={removeLine}/>
            ))}
          </div>
          <button className="btn-add-line" onClick={addLine}>＋ Add Line</button>

          <div className="fg mb16" style={{marginTop:16}}>
            <label className="form-label">Notes / Special Instructions</label>
            <textarea className="form-input" rows={2} value={form.notes}
              onChange={e=>setF("notes",e.target.value)}
              placeholder="e.g. Remount on different rim, junk tire, prior approval…"/>
          </div>

          <div className="fg mb16">
            <label className="form-label">Technician</label>
            <input className="form-input" value={form.technician||""}
              onChange={e=>setF("technician",e.target.value)}
              placeholder="Jeremy Forbes"
              list="tech-list"/>
            <datalist id="tech-list">
              {TECHNICIANS.map(t=><option key={t} value={t}/>)}
            </datalist>
          </div>

          <div className="wo-total-row">
            <span className="wo-total-label">Work Order Total</span>
            <span className="wo-total-amt">{$f(total)}</span>
          </div>

          {autoEmail&&<div style={{marginTop:10,padding:"8px 12px",background:"#eafaf1",borderRadius:6,fontSize:12,color:"#1e8449",display:"flex",gap:6}}>📧 Will auto-email when saved</div>}

          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
            <button className="btn-ghost" onClick={onCancel}>Cancel</button>
            <button className="btn-primary" onClick={()=>onSave(form)}>Save &amp; Send WO</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── LINE ROW ─────────────────────────────────────────────────────────────────
function LineRow({line,idx,canRemove,onChange,onRemove}){
  const br=bookRate(line.pricingCat,line.serviceType);
  const showSuggest=br>0&&line.rate!==br;
  const meta=getSvcMeta(line.serviceType);
  return (
    <div className="line-row">
      <div className="line-row-hdr">
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span className="line-num">Line {idx+1}</span>
          {meta.acct&&<span className="acct-pill">{ACCT_LABELS[meta.acct]||meta.acct}</span>}
        </div>
        {canRemove&&<button className="line-remove" onClick={()=>onRemove(line.id)}>Remove</button>}
      </div>

      {/* Row 1: Unit # | Position | Tire Size | Make */}
      <div className="form-row-4 mb8">
        <div className="fg"><label className="form-label">Unit #</label>
          <input className="form-input mono" value={line.unitNo} onChange={e=>onChange(line.id,{unitNo:e.target.value})} placeholder="785-01"/>
        </div>
        <div className="fg"><label className="form-label">Position</label>
          <AcInput value={line.position} onChange={v=>onChange(line.id,{position:v})} options={POSITIONS} placeholder="LF, RRO…"/>
        </div>
        <div className="fg"><label className="form-label">Tire Size</label>
          <AcInput value={line.tireSize} onChange={v=>onChange(line.id,{tireSize:v})} options={TIRE_SIZE_NAMES} placeholder="33.00R51…" monoFont/>
        </div>
        <div className="fg"><label className="form-label">Make</label>
          <AcInput value={line.make} onChange={v=>onChange(line.id,{make:v})} options={MAKES} placeholder="Bridgestone…"/>
        </div>
      </div>

      {/* Row 2: Serial # | Br# | Rim# | Service */}
      <div className="form-row-4 mb8">
        <div className="fg"><label className="form-label">Serial #</label>
          <input className="form-input mono" value={line.serialNo} onChange={e=>onChange(line.id,{serialNo:e.target.value})} placeholder="A9J000339"/>
        </div>
        <div className="fg"><label className="form-label">Br#</label>
          <input className="form-input mono" value={line.brNo} onChange={e=>onChange(line.id,{brNo:e.target.value})} placeholder="A129"/>
        </div>
        <div className="fg"><label className="form-label">Rim#</label>
          <input className="form-input mono" value={line.rimNo} onChange={e=>onChange(line.id,{rimNo:e.target.value})} placeholder="R1595"/>
        </div>
        <div className="fg"><label className="form-label">Service</label>
          <SvcPicker value={line.serviceType} onChange={v=>onChange(line.id,{serviceType:v})}/>
        </div>
      </div>

      {/* Row 3: Pricing Cat | Qty | Rate | Notes */}
      <div className="form-row-4">
        <div className="fg">
          <label className="form-label">
            Pricing Category
            {line.pricingCat&&<span style={{color:"#27ae60",fontWeight:600,fontSize:10,marginLeft:4}}>✓ Auto</span>}
          </label>
          <select className="form-input" value={line.pricingCat} onChange={e=>onChange(line.id,{pricingCat:e.target.value})}>
            <option value="">— Select —</option>
            {FULL_PRICING.map(p=><option key={p.cat} value={p.cat}>{p.cat}</option>)}
          </select>
        </div>
        <div className="fg"><label className="form-label">Qty / Hrs</label>
          <input type="number" min="0.25" step="0.25" className="form-input" value={line.qty}
            onChange={e=>onChange(line.id,{qty:parseFloat(e.target.value)||0})}/>
        </div>
        <div className="fg">
          <label className="form-label">
            Rate
            {showSuggest&&<button className="rate-suggest" onClick={()=>onChange(line.id,{rate:br})}>Use {$f(br)} ↑</button>}
          </label>
          <input type="number" step="0.01" className="form-input" value={line.rate}
            onChange={e=>onChange(line.id,{rate:parseFloat(e.target.value)||0})}/>
        </div>
        <div className="fg"><label className="form-label">Notes</label>
          <input className="form-input" value={line.notes}
            onChange={e=>onChange(line.id,{notes:e.target.value})}
            placeholder="Junk, spare, diff rim…"/>
        </div>
      </div>
      <div className="line-total">Line Total: <strong>{$f(lTotal(line))}</strong></div>
    </div>
  );
}

// ─── INVOICES VIEW ────────────────────────────────────────────────────────────
function InvoicesView({wos,onExport,onMarkInvoiced,onEdit}){
  const [sel,setSel]=useState([]);
  const [invNums,setInvNums]=useState({});
  const open=[...wos.filter(w=>w.status==="open")].sort((a,b)=>Number(b.id)-Number(a.id));
  const done=[...wos.filter(w=>w.status==="invoiced")].sort((a,b)=>Number(b.id)-Number(a.id));
  const toggle=id=>setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const selWOs=open.filter(w=>sel.includes(w.id));
  return (
    <div>
      <div className="nti-card" style={{marginBottom:24}}>
        <div className="nti-card-header">
          <span>Ready to Invoice ({open.length})</span>
          {sel.length>0&&<div style={{display:"flex",gap:12,alignItems:"center"}}>
            <span className="muted" style={{fontSize:13}}>{sel.length} WOs · {$f(selWOs.reduce((s,w)=>s+wTotal(w),0))}</span>
            <button className="btn-primary sm" onClick={()=>onExport(selWOs)}>Export → QBO</button>
          </div>}
        </div>
        {open.length===0?<div className="empty-state">All work orders invoiced.</div>:(
          <div style={{overflowX:"auto"}}>
            <table className="nti-table">
              <thead><tr>
                <th style={{width:32}}><input type="checkbox" checked={sel.length===open.length&&open.length>0} onChange={()=>setSel(s=>s.length===open.length?[]:open.map(w=>w.id))}/></th>
                <th>WO #</th><th>Date</th><th>Customer</th><th className="right">Amount</th><th>Invoice #</th><th className="right">Action</th>
              </tr></thead>
              <tbody>{open.map(wo=>(
                <tr key={wo.id} style={{background:sel.includes(wo.id)?"#f0f7ff":""}}>
                  <td><input type="checkbox" checked={sel.includes(wo.id)} onChange={()=>toggle(wo.id)}/></td>
                  <td><span className="wo-num">#{wo.id}</span></td>
                  <td className="muted">{wo.date}</td>
                  <td className="fw6">{wo.customer}</td>
                  <td className="right fw6">{$f(wTotal(wo))}</td>
                  <td><input className="form-input mono" style={{width:120,padding:"4px 8px",fontSize:12}} placeholder="INV-001"
                    value={invNums[wo.id]||""} onChange={e=>setInvNums(v=>({...v,[wo.id]:e.target.value}))}/></td>
                  <td className="right" style={{whiteSpace:"nowrap",display:"flex",gap:6,justifyContent:"flex-end"}}>
                    <button className="action-btn ab-blue"   onClick={()=>onEdit(wo)}>Edit</button>
                    <button className="action-btn ab-green"  onClick={()=>onExport([wo])}>QBO</button>
                    <button className="action-btn ab-orange" onClick={()=>{const inv=invNums[wo.id];if(!inv)return alert("Enter invoice # first");onMarkInvoiced(wo,inv);setSel(s=>s.filter(x=>x!==wo.id));}}>✓ Invoiced</button>
                  </td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
      </div>

      <div className="qbo-banner">
        <div className="qbo-banner-title">📥 QuickBooks Online Import</div>
        <ol className="qbo-steps">
          <li>Click <strong>QBO</strong> on any row or <strong>Export → QBO</strong> above to download CSV</li>
          <li>In QBO: <strong>Settings → Import Data → Invoices</strong></li>
          <li>Upload <code>NTI_QBO_[date].csv</code> — each WO becomes a draft invoice</li>
        </ol>
      </div>

      {done.length>0&&(
        <div className="nti-card">
          <div className="nti-card-header"><span>Invoice History ({done.length})</span>
            <button className="btn-outline" onClick={()=>onExport(done)}>Export All → QBO</button>
          </div>
          <div style={{overflowX:"auto"}}>
            <table className="nti-table">
              <thead><tr><th>WO #</th><th>Date</th><th>Customer</th><th className="right">Amount</th><th>Invoice #</th><th className="right">Re-export</th></tr></thead>
              <tbody>{done.map(wo=>(
                <tr key={wo.id}>
                  <td><span className="wo-num">#{wo.id}</span></td>
                  <td className="muted">{wo.date}</td>
                  <td className="fw6">{wo.customer}</td>
                  <td className="right fw6">{$f(wTotal(wo))}</td>
                  <td><span className="badge badge-green">{wo.invoiceNo}</span></td>
                  <td className="right"><button className="action-btn ab-green" onClick={()=>onExport([wo])}>QBO</button></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────
function SettingsView({settings,onSave}){
  const [f,setF]=useState({...settings,recipStr:(settings.recipients||[]).join(", ")});
  const save=()=>onSave({...settings,autoEmail:f.autoEmail,ccEmail:f.ccEmail||"",recipients:f.recipStr.split(",").map(s=>s.trim()).filter(Boolean)});
  return (
    <div>
      <div className="nti-card">
        <div className="nti-card-header">📧 Email Settings</div>
        <div style={{padding:"24px",display:"flex",flexDirection:"column",gap:20}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingBottom:16,borderBottom:"1px solid #f0f2f4"}}>
            <div>
              <div style={{fontWeight:600,fontSize:14,color:"#1a2332"}}>Auto-email on Save</div>
              <div style={{fontSize:12,color:"#7f8c8d",marginTop:2}}>Sends formatted WO + QBO CSV automatically when a work order is saved</div>
            </div>
            <div className="toggle" style={{background:f.autoEmail?"#27ae60":"#ccc"}}
              onClick={()=>setF(x=>({...x,autoEmail:!x.autoEmail}))}>
              <div className="toggle-knob" style={{left:f.autoEmail?24:2}}/>
            </div>
          </div>
          <div className="fg">
            <label className="form-label">To: Recipients (comma-separated)</label>
            <input className="form-input" value={f.recipStr} onChange={e=>setF(x=>({...x,recipStr:e.target.value}))} placeholder="northerntireinc@gmail.com, billing@customer.com"/>
          </div>
          <div className="fg">
            <label className="form-label">CC: (optional)</label>
            <input className="form-input" value={f.ccEmail||""} onChange={e=>setF(x=>({...x,ccEmail:e.target.value}))}/>
          </div>
          <button className="btn-primary" style={{alignSelf:"flex-start"}} onClick={save}>Save Settings</button>
        </div>
      </div>
      <div className="nti-card">
        <div className="nti-card-header">☁️ Google Drive</div>
        <div style={{padding:"20px 24px",fontSize:13,color:"#555",lineHeight:1.8}}>
          Each auto-email to northerntireinc@gmail.com includes the QBO CSV in the body.
          In Gmail, click the <strong>Drive icon</strong> to save directly to Drive. 
          Or install <strong>"Save Emails to Google Drive"</strong> from G Suite Marketplace and set a filter to auto-archive all <em>NTI Work Order</em> subject-line emails to a Drive folder.
        </div>
      </div>
      <div className="nti-card">
        <div className="nti-card-header">🗄️ Supabase Database</div>
        <div style={{padding:"20px 24px",fontSize:13,color:"#555",lineHeight:1.8}}>
          All work orders are stored in your Supabase <code style={{background:"#f0f2f5",padding:"1px 5px",borderRadius:3}}>work_orders</code> table — synced across all devices in real time.
          Edit credentials and starting WO# in the <code style={{background:"#f0f2f5",padding:"1px 5px",borderRadius:3}}>&lt;script&gt;</code> block at the top of <strong>index.html</strong>.
        </div>
      </div>
    </div>
  );
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
